syntax = "proto3";

package chill.v4;

import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  base_path: "/v4";
  info: {
    title: "Chill API v4 RPC";
    version: "4";
  };
  security_definitions: {
    security: {
      key: "ApiKeyAuth";
      value: {
        type: TYPE_API_KEY;
        description: "Core API key. Send the key in X-API-Key. Do not use Bearer.";
        in: IN_HEADER;
        name: "X-API-Key";
      };
    };
    security: {
      key: "BearerAuth";
      value: {
        type: TYPE_API_KEY;
        description: "User auth token. Format: Bearer <token>. Do not send API keys as Bearer tokens.";
        in: IN_HEADER;
        name: "Authorization";
      };
    };
  };
};

service CoreService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "ApiKeyAuth";
          value: {};
        };
      };
      parameters: {
        headers: {
          name: "X-API-Key";
          description: "Core API key";
          type: STRING;
          required: true;
        };
      };
    };
  }
  rpc GetIndexers(CoreGetIndexersRequest) returns (CoreGetIndexersResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "ApiKeyAuth";
          value: {};
        };
      };
      parameters: {
        headers: {
          name: "X-API-Key";
          description: "Core API key";
          type: STRING;
          required: true;
        };
      };
    };
  }
  rpc Search(CoreSearchRequest) returns (SearchResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "ApiKeyAuth";
          value: {};
        };
      };
      parameters: {
        headers: {
          name: "X-API-Key";
          description: "Core API key";
          type: STRING;
          required: true;
        };
      };
    };
  }
  rpc GetMoviesBySource(GetMoviesBySourceRequest) returns (GetMoviesBySourceResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "ApiKeyAuth";
          value: {};
        };
      };
      parameters: {
        headers: {
          name: "X-API-Key";
          description: "Core API key";
          type: STRING;
          required: true;
        };
      };
    };
  }
  rpc GetTVShowsBySource(GetTVShowsBySourceRequest) returns (GetTVShowsBySourceResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "ApiKeyAuth";
          value: {};
        };
      };
      parameters: {
        headers: {
          name: "X-API-Key";
          description: "Core API key";
          type: STRING;
          required: true;
        };
      };
    };
  }
}

