message HealthCheckRequest {}

message HealthResponse {
  string status = 1;
}

enum IndexerStatus {
  INDEXER_STATUS_UNSPECIFIED = 0;
  INDEXER_STATUS_HEALTHY = 1;
  INDEXER_STATUS_DEGRADED = 2;
  INDEXER_STATUS_DOWN = 3;
}

message CoreGetIndexersRequest {}

message Indexer {
  string id = 1;
  string name = 2;
  repeated string tags = 3;
  reserved 4, 5;
  reserved "healthy";
  optional IndexerStatus status = 6;
}

message CoreGetIndexersResponse {
  repeated Indexer indexers = 1;
}

message UserGetIndexersRequest {}

message UserGetIndexersResponse {
  repeated UserIndexer indexers = 1;
}

message UserIndexer {
  string id = 1;
  string name = 2;
  bool enabled = 3;
  repeated string tags = 4;
  reserved 5, 6;
  reserved "healthy";
  optional IndexerStatus status = 7;
}

message CoreSearchRequest {
  string query = 1;
}

message SearchResult {
  string id = 1;
  string title = 2;
  string indexer = 3;
  string link = 4;
  optional string imdb_id = 5;
  int64 peers = 6;
  int64 seeders = 7;
  int64 size = 8;
  string source = 9;
  string uploaded_at = 10;
}

message SearchResponse {
  string query = 1;
  repeated SearchResult results = 2;
}

message UserSearchRequest {
  string query = 1;
  optional string indexer_id = 2;
}

enum MoviesSource {
  MOVIES_SOURCE_UNSPECIFIED = 0;
  MOVIES_SOURCE_IMDB_MOVIEMETER = 1;
  MOVIES_SOURCE_IMDB_TOP_250 = 2;
  MOVIES_SOURCE_YTS = 3;
  MOVIES_SOURCE_ROTTEN_TOMATOES = 4;
  MOVIES_SOURCE_TRAKT = 5;
}

enum TVShowsSource {
  TV_SHOWS_SOURCE_UNSPECIFIED = 0;
  TV_SHOWS_SOURCE_NETFLIX = 1;
  TV_SHOWS_SOURCE_HBO_MAX = 2;
  TV_SHOWS_SOURCE_APPLE_TV_PLUS = 3;
  TV_SHOWS_SOURCE_PRIME_VIDEO = 4;
  TV_SHOWS_SOURCE_DISNEY_PLUS = 5;
}

enum TVShowStatus {
  TV_SHOW_STATUS_UNSPECIFIED = 0;
  TV_SHOW_STATUS_RETURNING = 1;
  TV_SHOW_STATUS_ENDED = 2;
  TV_SHOW_STATUS_CANCELED = 3;
  TV_SHOW_STATUS_IN_PRODUCTION = 4;
  TV_SHOW_STATUS_PLANNED = 5;
}

message GetMoviesBySourceRequest {
  MoviesSource source = 1;
}

message Movie {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      required: ["poster_url"]
    }
  };

  string id = 1;
  string title = 2;
  int32 year = 3;
  MoviesSource source = 4;
  string title_pretty = 5;
  string link = 6;
  int64 peers = 7;
  int64 seeders = 8;
  int64 size = 9;
  string uploaded_at = 10;
  string poster_url = 11;
  double rating = 12;
  string external_url = 13;
}

message GetMoviesBySourceResponse {
  MoviesSource source = 1;
  repeated Movie movies = 2;
}

message GetMoviesRequest {}

message GetMoviesResponse {
  MoviesSource source = 1;
  repeated Movie movies = 2;
  string rss_feed_url = 3;
}

message TVShow {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      required: ["imdb_id", "poster_url"]
    }
  };

  string imdb_id = 1;
  string title = 2;
  int32 year = 3;
  TVShowsSource source = 4;
  string poster_url = 5;
  double rating = 6;
  string overview = 7;
  string external_url = 8;
  int32 season_count = 9;
  TVShowStatus status = 10;
  repeated string networks = 11;
}

message GetTVShowsBySourceRequest {
  TVShowsSource source = 1;
}

message GetTVShowsBySourceResponse {
  TVShowsSource source = 1;
  repeated TVShow shows = 2;
}

message GetTVShowsRequest {}

message GetTVShowsResponse {
  TVShowsSource source = 1;
  repeated TVShow shows = 2;
}

message TVShowDetail {
  string imdb_id = 1;
  string title = 2;
  int32 year = 3;
  string poster_url = 4;
  string backdrop_url = 5;
  double rating = 6;
  string overview = 7;
  string external_url = 8;
  int32 season_count = 9;
  TVShowStatus status = 10;
  repeated string networks = 11;
  repeated string genres = 12;
}

message TVShowSeason {
  int32 season_number = 1;
  string name = 2;
  int32 episode_count = 3;
  string air_date = 4;
  string poster_url = 5;
}

message TVShowEpisode {
  int32 season_number = 1;
  int32 episode_number = 2;
  string name = 3;
  string overview = 4;
  string air_date = 5;
  int32 runtime = 6;
  string still_url = 7;
  double rating = 8;
}

message GetTVShowDetailRequest {
  string imdb_id = 1;
}

message GetTVShowDetailResponse {
  TVShowDetail show = 1;
  repeated TVShowSeason seasons = 2;
}

message GetTVShowSeasonRequest {
  string imdb_id = 1;
  int32 season_number = 2;
}

message GetTVShowSeasonResponse {
  string imdb_id = 1;
  int32 season_number = 2;
  TVShowSeason season = 3;
  repeated TVShowEpisode episodes = 4;
}

message TVShowDownload {
  string title = 1;
  string link = 2;
  int64 size = 3;
  int64 seeders = 4;
  string resolution = 5;
  string codec = 6;
  string quality = 7;
  string indexer = 8;
  int32 season_number = 9;
  optional int32 episode_number = 10;
}

message GetTVShowEpisodeDownloadRequest {
  string imdb_id = 1;
  int32 season_number = 2;
  int32 episode_number = 3;
}

message GetTVShowEpisodeDownloadResponse {
  optional TVShowDownload download = 1;
  string search_query = 2;
}

message GetTVShowSeasonDownloadsRequest {
  string imdb_id = 1;
  int32 season_number = 2;
}

message GetTVShowSeasonDownloadsResponse {
  optional TVShowDownload season_pack = 1;
  repeated TVShowEpisodeDownloadResult episodes = 2;
  string season_search_query = 3;
}

message TVShowEpisodeDownloadResult {
  int32 episode_number = 1;
  optional TVShowDownload download = 2;
  string search_query = 3;
}

message GetUserSettingsRequest {}

enum ResolutionFilter {
  RESOLUTION_FILTER_UNSPECIFIED = 0;
  RESOLUTION_FILTER_720P = 1;
  RESOLUTION_FILTER_1080P = 2;
  RESOLUTION_FILTER_2160P = 3;
}

enum CodecFilter {
  CODEC_FILTER_UNSPECIFIED = 0;
  CODEC_FILTER_X264 = 1;
  CODEC_FILTER_X265 = 2;
}

enum OtherFilter {
  OTHER_FILTER_UNSPECIFIED = 0;
  OTHER_FILTER_HDR = 1;
}

enum SearchResultDisplayBehavior {
  SEARCH_RESULT_DISPLAY_BEHAVIOR_UNSPECIFIED = 0;
  SEARCH_RESULT_DISPLAY_BEHAVIOR_ALL = 1;
  SEARCH_RESULT_DISPLAY_BEHAVIOR_FASTEST = 2;
}

enum SearchResultTitleBehavior {
  SEARCH_RESULT_TITLE_BEHAVIOR_UNSPECIFIED = 0;
  SEARCH_RESULT_TITLE_BEHAVIOR_LINK = 1;
  SEARCH_RESULT_TITLE_BEHAVIOR_TEXT = 2;
}

enum SortBy {
  SORT_BY_UNSPECIFIED = 0;
  SORT_BY_TITLE = 1;
  SORT_BY_SEEDERS = 2;
  SORT_BY_SIZE = 3;
  SORT_BY_UPLOADED_AT = 4;
  SORT_BY_SOURCE = 5;
}

enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASC = 1;
  SORT_DIRECTION_DESC = 2;
}

enum CardDisplayType {
  CARD_DISPLAY_TYPE_UNSPECIFIED = 0;
  CARD_DISPLAY_TYPE_COMPACT = 1;
  CARD_DISPLAY_TYPE_EXPANDED = 2;
}

message UserSettings {
  reserved 11;
  repeated CodecFilter codec_filters = 1;
  repeated string disabled_indexer_ids = 2;
  optional int64 download_folder_id = 3;
  bool filter_nasty_results = 4;
  bool filter_results_with_no_seeders = 5;
  repeated OtherFilter other_filters = 6;
  bool remember_quick_filters = 7;
  repeated ResolutionFilter resolution_filters = 8;
  SearchResultDisplayBehavior search_result_display_behavior = 9;
  SearchResultTitleBehavior search_result_title_behavior = 10;
  bool show_movies = 12;
  SortBy sort_by = 13;
  SortDirection sort_direction = 14;
  CardDisplayType card_display_type = 15;
  MoviesSource movies_source = 16;
  bool show_tv_shows = 17;
  TVShowsSource tv_shows_source = 18;
}

message SaveUserSettingsRequest {
  UserSettings settings = 1;
}

message AddTransferRequest {
  string url = 1;
}

message AddTransferResponse {
  string status = 1;
  Transfer transfer = 2;
}

message GetTransferRequest {
  int64 id = 1;
}

message GetTransferResponse {
  Transfer transfer = 1;
}

message Transfer {
  int64 id = 1;
  string name = 2;
  string status = 3;
  int32 percent_done = 4;
  string status_message = 5;
  string error_message = 6;
  int64 size = 7;
  int64 downloaded = 8;
  int64 uploaded = 9;
  int32 download_speed = 10;
  int32 upload_speed = 11;
  int32 peers_connected = 12;
  int32 peers_sending_to_us = 13;
  int32 peers_getting_from_us = 14;
  int64 estimated_time_seconds = 15;
  optional int64 file_id = 16;
  optional string file_url = 17;
  optional int64 save_parent_id = 18;
  string source = 19;
  optional string created_at = 20;
  optional string finished_at = 21;
  bool is_finished = 22;
}

message GetDownloadFolderRequest {}

message GetDownloadFolderResponse {
  UserFile folder = 1;
}

message GetFolderRequest {
  int64 id = 1;
}

message UserFile {
  int64 id = 1;
  string name = 2;
  string file_type = 3;
  bool is_shared = 4;
  string created_at = 5;
}

message GetFolderResponse {
  UserFile parent = 1;
  repeated UserFile files = 2;
}

message GetUserProfileRequest {}

message UserProfile {
  string user_id = 1;
  string username = 2;
  string avatar_url = 3;
  string email = 4;
}
