name: Verify

on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Verify contracts
        run: mise run verify

      - name: Check generated artifacts are committed
        run: git diff --exit-code

      - name: Fetch main for breaking-change check
        run: git fetch --no-tags origin main:main

      - name: Check breaking changes against main
        run: buf breaking --against '.git#branch=main'
