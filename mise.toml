[tools]
buf = "1.66.1"
go = "1.26.1"
node = "24.14.0"

[env]
GOWORK = "off"

[tasks.generate]
description = "Generate Go, TypeScript, and OpenAPI artifacts from protobuf sources"
run = [
  "rm -rf gen",
  "buf generate",
  "go mod tidy"
]

[tasks.smoke]
description = "Run a fast protobuf compile smoke check"
run = "buf build"

[tasks.verify]
description = "Verify protobuf contracts and generated artifacts"
run = [
  "mise run smoke",
  "buf lint",
  "mise run generate",
  "go test ./..."
]
